name: DBD News Monitor
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: uv pip install requests beautifulsoup4

      - name: Run Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: uv run tools/newswatcher/main.py

      - name: Update State
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "EntityBot"
          
          git pull origin master --rebase
          
          git add last_intel.json
          
          git commit -m "Update last seen article" || exit 0
          git push origin master