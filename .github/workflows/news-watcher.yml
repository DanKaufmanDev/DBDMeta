name: DBD News Monitor
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - name: Install dependencies
        run: uv pip install requests beautifulsoup4
      - name: Run Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: uv run tools/newswatcher/main.py
      - name: Update State
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "EntityBot"
          git add last_intel.json
          git commit -m "Update last seen article" || exit 0
          git push